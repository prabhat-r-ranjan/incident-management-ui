apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: incident-ui-ingress
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: incident-backend
                port:
                  number: 8081

          - path: /
            pathType: Prefix
            backend:
              service:
                name: incident-ui
                port:
                  number: 3000

          - path: /actuator
            pathType: Prefix
            backend:
              service:
                name: incident-backend
                port:
                  number: 8081