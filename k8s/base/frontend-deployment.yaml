apiVersion: apps/v1
kind: Deployment
metadata:
  name: incident-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: incident-ui
  template:
    metadata:
      labels:
        app: incident-ui
    spec:
      containers:
        - name: incident-ui
          image: prabhatcr001.azurecr.io/incident-ui:26ed6eb63a0cbda342839bd473d39ae0d555bbff
          ports:
            - containerPort: 3000